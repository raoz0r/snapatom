name: Compile, Package and Release

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write # Required to create a release and upload assets

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '8.0.x'

    # 1. Publish the Single-File Executable
    - name: Publish SnapAtom Single-File
      run: |
        dotnet publish SnapAtom.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:PublishReadyToRun=true -o publish_output

    # 2. Install WiX Toolset CLI
    - name: Install WiX CLI
      shell: pwsh
      run: |
        dotnet tool install --global wix

    - name: Accept WiX EULA
      shell: pwsh
      run: |
        wix eula accept wix7

    # 3. Build the MSI Installer Package (dynamically versioned with run number)
    - name: Build MSI Package
      shell: pwsh
      run: |
        dotnet build SnapAtom.wixproj -c Release -p:PublishDir=publish_output -p:Version=1.0.${{ github.run_number }}
        Copy-Item -Path "bin\Release\SnapAtom.msi" -Destination "SnapAtom.msi"

    # 4. Upload Build Artifact (allows downloading SnapAtom.msi directly from any Action run)
    - name: Upload Installer Artifact
      uses: actions/upload-artifact@v4
      with:
        name: SnapAtomInstaller
        path: SnapAtom.msi

    # 5. Create GitHub Release & Upload Installer
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v1.0.${{ github.run_number }}
        name: Release v1.0.${{ github.run_number }}
        files: SnapAtom.msi
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
