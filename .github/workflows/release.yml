name: Compile, Package and Release

on:
  push:
    tags:
      - 'v*' # Triggers on any tag starting with v (e.g., v1.0.0)
  workflow_dispatch: # Allows you to trigger the build manually from GitHub Web UI

jobs:
  build-and-release:
    runs-on: windows-latest # Windows runner has dotnet and Windows SDK (signtool) pre-installed

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '8.0.x'

    # 1. Publish the Single-File Executable
    - name: Publish SnapAtom Single-File
      run: |
        dotnet publish -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:PublishReadyToRun=true -o publish_output

    # 2. Decode & Import Code Signing Certificate (if configured in GitHub secrets)
    # Secrets to set: SIGNING_CERT_BASE64 (Base64 string of PFX) and SIGNING_CERT_PASSWORD
    - name: Prepare Code Signing Certificate
      if: env.HAS_CERT == 'true'
      env:
        HAS_CERT: ${{ secrets.SIGNING_CERT_BASE64 != '' }}
      shell: pwsh
      run: |
        $certBytes = [System.Convert]::FromBase64String("${{ secrets.SIGNING_CERT_BASE64 }}")
        [System.IO.File]::WriteAllBytes("${{ github.workspace }}\signing_cert.pfx", $certBytes)

    # 3. Sign the Executable (signtool is preinstalled on windows-latest runner)
    - name: Sign Executable
      if: env.HAS_CERT == 'true'
      env:
        HAS_CERT: ${{ secrets.SIGNING_CERT_BASE64 != '' }}
      shell: pwsh
      run: |
        # Locate signtool
        $signtool = Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits" -Filter "signtool.exe" -Recurse | Select-Object -First 1
        & $signtool.FullName sign /f "${{ github.workspace }}\signing_cert.pfx" /p "${{ secrets.SIGNING_CERT_PASSWORD }}" /tr http://timestamp.digicert.com /td sha256 /fd sha256 "${{ github.workspace }}\publish_output\SnapAtom.exe"

    # 4. Install WiX Toolset CLI
    - name: Install WiX CLI
      shell: pwsh
      run: |
        dotnet tool install --global wix

    - name: Accept WiX EULA
      shell: pwsh
      run: |
        wix eula accept wix7

    # 5. Build the MSI Installer Package
    - name: Build MSI Package
      shell: pwsh
      run: |
        dotnet build SnapAtom.wixproj -c Release -p:PublishDir=publish_output
        Copy-Item -Path "bin\Release\SnapAtom.msi" -Destination "SnapAtom.msi"

    # 6. Sign the MSI Package
    - name: Sign MSI Package
      if: env.HAS_CERT == 'true'
      env:
        HAS_CERT: ${{ secrets.SIGNING_CERT_BASE64 != '' }}
      shell: pwsh
      run: |
        $signtool = Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits" -Filter "signtool.exe" -Recurse | Select-Object -First 1
        & $signtool.FullName sign /f "${{ github.workspace }}\signing_cert.pfx" /p "${{ secrets.SIGNING_CERT_PASSWORD }}" /tr http://timestamp.digicert.com /td sha256 /fd sha256 "${{ github.workspace }}\SnapAtom.msi"

    # 7. Upload Build Artifact (allows downloading SnapAtom.msi directly from any Action run)
    - name: Upload Installer Artifact
      uses: actions/upload-artifact@v4
      with:
        name: SnapAtomInstaller
        path: ${{ github.workspace }}\SnapAtom.msi

    # 8. Create GitHub Release & Upload Installer (only runs on tags)
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2.2.0
      with:
        files: |
          ${{ github.workspace }}\SnapAtom.msi
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
